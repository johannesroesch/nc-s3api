name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  wait-for-ci:
    name: Warte auf CI
    runs-on: ubuntu-latest

    steps:
      - name: CI-Ergebnis des Commits prüfen
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"
          echo "Warte auf CI für Commit $SHA ..."

          for i in $(seq 1 40); do
            JSON=$(gh api "repos/$REPO/actions/runs?head_sha=$SHA&event=push" 2>/dev/null)
            STATUS=$(echo "$JSON"     | jq -r '[.workflow_runs[] | select(.name == "CI")] | first | .status')
            CONCLUSION=$(echo "$JSON" | jq -r '[.workflow_runs[] | select(.name == "CI")] | first | .conclusion')

            echo "Versuch $i – Status: $STATUS / Conclusion: $CONCLUSION"

            if [ "$CONCLUSION" = "success" ]; then
              echo "CI erfolgreich."
              exit 0
            elif [ "$CONCLUSION" = "failure" ] || [ "$CONCLUSION" = "cancelled" ]; then
              echo "CI fehlgeschlagen: $CONCLUSION"
              exit 1
            fi

            sleep 15
          done

          echo "Timeout: CI hat nicht rechtzeitig abgeschlossen."
          exit 1

  release:
    name: Release bauen & veröffentlichen
    runs-on: ubuntu-latest
    needs: [wait-for-ci]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: PHP einrichten
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, intl
          coverage: none
          tools: composer:v2

      - name: Version aus Tag ermitteln
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Versionsnummer in info.xml einsetzen
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: sed -i "s|<version>.*</version>|<version>${VERSION}</version>|" appinfo/info.xml

      - name: Produktiv-Abhängigkeiten installieren
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: App-Tarball erstellen
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          APP_ID="nc_s3api"
          TARBALL="${APP_ID}-${VERSION}.tar.gz"
          tar -czf "../${TARBALL}" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='tests' \
            --exclude='docker-compose.yml' \
            --exclude='scripts' \
            --exclude='*.tar.gz' \
            --transform "s|^\.|${APP_ID}|" \
            .
          echo "TARBALL=../${TARBALL}" >> "$GITHUB_OUTPUT"
          echo "TARBALL_NAME=${TARBALL}" >> "$GITHUB_OUTPUT"
        id: build

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.build.outputs.TARBALL }}

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    permissions:
      checks: write

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: PHP ${{ matrix.php }} einrichten
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, intl
          coverage: none
          tools: composer:v2

      - name: Composer-Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Abhängigkeiten installieren
        run: composer install --no-interaction --prefer-dist --no-progress --ignore-platform-reqs

      - name: Tests ausführen
        run: vendor/bin/phpunit --testsuite unit --log-junit test-results.xml

      - name: Testergebnisse veröffentlichen
        uses: mikepenz/action-junit-report@49b2ca06f62aa7ef83ae6769a2179271e160d8e4 # v6
        if: always()
        with:
          report_paths: test-results.xml
          check_name: PHPUnit (PHP ${{ matrix.php }})

  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: PHP 8.2 mit Xdebug einrichten
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, intl
          coverage: xdebug
          tools: composer:v2

      - name: Composer-Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: vendor
          key: composer-8.2-${{ hashFiles('composer.json') }}
          restore-keys: composer-8.2-

      - name: Abhängigkeiten installieren
        run: composer install --no-interaction --prefer-dist --no-progress --ignore-platform-reqs

      - name: Tests mit Coverage ausführen
        run: vendor/bin/phpunit --testsuite unit --coverage-clover coverage.xml

      - name: Coverage zu Codecov hochladen
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: PHP 8.2 einrichten
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, intl
          coverage: none
          tools: composer:v2

      - name: Composer-Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: vendor
          key: composer-8.2-${{ hashFiles('composer.json') }}
          restore-keys: composer-8.2-

      - name: Abhängigkeiten installieren
        run: composer install --no-interaction --prefer-dist --no-progress --ignore-platform-reqs

      - name: Sicherheits-Audit
        run: composer audit --no-interaction

      - name: PHPStan ausführen
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G

  cs:
    name: Code Style (PHP-CS-Fixer)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: PHP 8.2 einrichten
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, intl
          coverage: none
          tools: composer:v2

      - name: Composer-Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: vendor
          key: composer-8.2-${{ hashFiles('composer.json') }}
          restore-keys: composer-8.2-

      - name: Abhängigkeiten installieren
        run: composer install --no-interaction --prefer-dist --no-progress --ignore-platform-reqs

      - name: Code Style prüfen
        run: vendor/bin/php-cs-fixer check --diff

  infection:
    name: Mutation Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: PHP 8.2 mit Xdebug einrichten
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, intl
          coverage: xdebug
          tools: composer:v2

      - name: Composer-Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: vendor
          key: composer-8.2-${{ hashFiles('composer.json') }}
          restore-keys: composer-8.2-

      - name: Abhängigkeiten installieren
        run: composer install --no-interaction --prefer-dist --no-progress --ignore-platform-reqs

      - name: Infection ausführen
        run: vendor/bin/infection --no-progress --min-msi=60 --min-covered-msi=70 --test-framework-options=--testsuite=unit
